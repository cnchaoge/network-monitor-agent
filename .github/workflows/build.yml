name: Build Windows Agent

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pystray pillow pyinstaller

      - name: Build exe
        working-directory: agent
        run: |
          pyinstaller --onefile --noconsole --name "NetworkMonitorAgent" windows_agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkMonitorAgent-win
          path: agent/dist/*.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v4
        with:
          artifacts: agent/dist/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
