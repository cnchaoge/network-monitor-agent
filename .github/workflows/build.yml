name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pystray pillow pyinstaller

      - name: Build .exe
        run: |
          cd agent
          pyinstaller --onefile --name NetworkMonitorAgent --noconsole windows_agent.py

      - name: Upload .exe to release
        uses: softprops/action-gh-release@v1
        with:
          files: agent/dist/NetworkMonitorAgent.exe
          tag_name: v0.2
          name: "NetworkMonitorAgent v0.2"
          body: "企业网络监控 Windows 安装包 v0.2\n\n更新：用户认证 + 实时推送 + 状态指示灯 + 微信报警\n\n直接下载 NetworkMonitorAgent.exe，双击运行即可。\n首次运行会弹出设置向导，填写企业名称后自动完成注册。"
          allow_same_tag: true
