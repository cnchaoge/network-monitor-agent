<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备详情</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 24px; }
.back { display: inline-flex; align-items: center; gap: 6px; color: #007aff; font-size: 13px; cursor: pointer; margin-bottom: 16px; }
.back:hover { opacity: 0.7; }
.card { background: #fff; border: 1px solid #e5e5ea; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #1d1d1f; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-item { display: flex; flex-direction: column; gap: 2px; }
.info-label { font-size: 11px; color: #86868b; }
.info-value { font-size: 13px; font-weight: 500; }
.status-online { color: #34c759; } .status-offline { color: #ff3b30; }
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
.metric-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.metric-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: #34c759; box-shadow: 0 0 5px rgba(52,199,89,0.5); }
.dot-orange { background: #ff9500; box-shadow: 0 0 5px rgba(255,149,0,0.5); }
.dot-red { background: #ff3b30; box-shadow: 0 0 5px rgba(255,59,48,0.5); }
.dot-grey { background: #d2d2d7; }
.metric-label { color: #86868b; }
.metric-val { font-weight: 600; margin-left: auto; }
.val-green { color: #34c759; } .val-orange { color: #ff9500; } .val-red { color: #ff3b30; } .val-grey { color: #aeaeb2; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; background: #f5f5f7; color: #86868b; font-weight: 500; border-bottom: 1px solid #e5e5ea; }
td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
tr:last-child td { border-bottom: none; }
.type-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.type-router { background: rgba(0,122,255,0.12); color: #007aff; }
.type-switch { background: rgba(88,86,214,0.12); color: #5856d6; }
.type-server { background: rgba(52,199,89,0.12); color: #34c759; }
.type-printer { background: rgba(255,149,0,0.12); color: #ff9500; }
.type-pc { background: rgba(142,142,147,0.12); color: #636366; }
.type-phone { background: rgba(48,199,190,0.12); color: #30c7be; }
.type-unknown { background: #f0f0f0; color: #86868b; }
.empty { text-align: center; padding: 32px; color: #86868b; font-size: 13px; }
.online-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.online-dot.on { background: #34c759; }
.online-dot.off { background: #ff3b30; }
.tip { font-size: 11px; color: #86868b; margin-top: 6px; }
canvas { max-height: 180px; }
</style>
</head>
<body>
<a class="back" onclick="history.back()">← 返回列表</a>
<div id="content"><div class="empty">加载中...</div></div>
<script>
var SERVER = location.origin;
var agentId = location.pathname.split('/agent/')[1];

// 阈值
var THRESHOLDS = {
  ping_rtt_ms:   { warn: 80,  crit: 150 },
  ping_loss_pct: { warn: 5,   crit: 20  },
  dns_ms:        { warn: 100, crit: 300 },
  target_rtt_ms: { warn: 100, crit: 300 },
};

function dotClass(v, t) {
  if (v === null || v === undefined) return 'dot-grey';
  if (v >= t.crit) return 'dot-red';
  if (v >= t.warn) return 'dot-orange';
  return 'dot-green';
}
function valClass(v, t) {
  if (v === null || v === undefined) return 'val-grey';
  if (v >= t.crit) return 'val-red';
  if (v >= t.warn) return 'val-orange';
  return 'val-green';
}
function fmt(v) { return (v === null || v === undefined) ? '-' : v.toFixed(1); }

function timeAgo(ts) {
  if (!ts) return '无数据';
  var s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + '秒前';
  if (s < 3600) return Math.floor(s/60) + '分钟前';
  return Math.floor(s/3600) + '小时前';
}

function deviceTypeBadge(t) {
  var m = { router:'路由器', switch:'交换机', server:'服务器', printer:'打印机', pc:'电脑', phone:'手机', unknown:'未知设备' };
  return '<span class="type-badge type-' + t + '">' + (m[t] || t) + '</span>';
}

function load() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', SERVER + '/api/agents/' + agentId, false);
  xhr.send(null);
  var agent = xhr.status === 200 ? JSON.parse(xhr.responseText) : {};

  var xhr2 = new XMLHttpRequest();
  xhr2.open('GET', SERVER + '/api/' + agentId + '/latest', false);
  xhr2.send(null);
  var latest = xhr2.status === 200 ? JSON.parse(xhr2.responseText) : null;

  var xhr3 = new XMLHttpRequest();
  xhr3.open('GET', SERVER + '/api/' + agentId + '/topology', false);
  xhr3.send(null);
  var topology = xhr3.status === 200 ? JSON.parse(xhr3.responseText) : [];

  var xhr4 = new XMLHttpRequest();
  xhr4.open('GET', SERVER + '/api/' + agentId + '/history?limit=60', false);
  xhr4.send(null);
  var history = xhr4.status === 200 ? JSON.parse(xhr4.responseText) : [];

  var isOnline = latest && (Date.now()/1000 - latest.timestamp) < 300;
  var statusClass = isOnline ? 'status-online' : 'status-offline';
  var statusText = isOnline ? '● 在线' : '● 离线';
  var ago = latest ? timeAgo(latest.timestamp) : '无数据';

  // 探测指标
  var metrics = [
    { key: 'ping_rtt_ms',    label: '网关延迟',  unit: 'ms', t: THRESHOLDS.ping_rtt_ms },
    { key: 'ping_loss_pct',  label: '丢包率',    unit: '%',  t: THRESHOLDS.ping_loss_pct },
    { key: 'dns_ms',         label: 'DNS延迟',  unit: 'ms', t: THRESHOLDS.dns_ms },
    { key: 'target_rtt_ms',  label: (latest && latest.target_name ? latest.target_name : '目标') + '延迟', unit: 'ms', t: THRESHOLDS.target_rtt_ms },
  ];

  var metricsHtml = '<div class="metrics-grid">';
  metrics.forEach(function(m) {
    var v = latest ? latest[m.key] : null;
    metricsHtml += '<div class="metric-item">' +
      '<span class="metric-dot ' + dotClass(v, m.t) + '"></span>' +
      '<span class="metric-label">' + m.label + '</span>' +
      '<span class="metric-val ' + valClass(v, m.t) + '">' + fmt(v) + (v !== null && v !== undefined ? m.unit : '') + '</span>' +
      '</div>';
  });
  metricsHtml += '</div>';

  // 拓扑表格
  var topoHtml = '';
  if (topology.length === 0) {
    topoHtml = '<div class="empty">暂无拓扑数据<br><span class="tip">Agent 上报后会显示局域网设备列表</span></div>';
  } else {
    topoHtml = '<table><thead><tr><th>IP</th><th>MAC</th><th>主机名</th><th>厂商</th><th>类型</th><th>状态</th></tr></thead><tbody>';
    topology.forEach(function(dev) {
      var isRecent = (Date.now()/1000 - dev.last_seen) < 3600;
      topoHtml += '<tr>' +
        '<td style="font-weight:600;">' + dev.ip + '</td>' +
        '<td style="font-size:12px;color:#86868b;font-family:monospace;">' + dev.mac + '</td>' +
        '<td>' + (dev.hostname || '-') + '</td>' +
        '<td style="font-size:12px;">' + (dev.vendor || '-') + '</td>' +
        '<td>' + deviceTypeBadge(dev.device_type || 'unknown') + '</td>' +
        '<td><span class="online-dot ' + (isRecent ? 'on' : 'off') + '"></span>' + (isRecent ? '在线' : '离线') + '</td>' +
        '</tr>';
    });
    topoHtml += '</tbody></table>';
  }

  // 历史趋势图
  var chartHtml = '<div style="margin-top:12px;"><canvas id="trendChart"></canvas></div>';

  // 渲染
  var html = '';
  html += '<div class="card">' +
    '<div class="card-title">' + (agent.name || '未知设备') + ' <span class="' + statusClass + '">' + statusText + '</span></div>' +
    '<div class="info-grid">' +
    '<div class="info-item"><span class="info-label">企业名称</span><span class="info-value">' + (agent.customer_name || '-') + '</span></div>' +
    '<div class="info-item"><span class="info-label">最后活跃</span><span class="info-value">' + ago + '</span></div>' +
    '<div class="info-item"><span class="info-label">Agent ID</span><span class="info-value" style="font-size:11px;font-family:monospace;">' + agent.id + '</span></div>' +
    '<div class="info-item"><span class="info-label">安装位置</span><span class="info-value">' + (agent.location || '-') + '</span></div>' +
    '<div class="info-item"><span class="info-label">本地网段</span><span class="info-value">' + (agent.subnets || '-') + '</span></div>' +
    '</div>' +
    '</div>';

  html += '<div class="card">' +
    '<div class="card-title">当前状态</div>' +
    metricsHtml +
    '</div>';

  html += '<div class="card">' +
    '<div class="card-title">局域网拓扑 <span style="font-size:12px;color:#86868b;font-weight:400;">(' + topology.length + ' 台设备)</span></div>' +
    topoHtml +
    '</div>';

  html += '<div class="card">' +
    '<div class="card-title">延迟趋势 (最近 ' + history.length + ' 条)</div>' +
    chartHtml +
    '</div>';

  document.getElementById('content').innerHTML = html;

  // 画趋势图
  if (history.length > 0 && window.chartRendered === undefined) {
    window.chartRendered = true;
    var ctx = document.getElementById('trendChart').getContext('2d');
    var labels = history.slice().reverse().map(function(h) {
      return new Date(h.timestamp * 1000).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    });
    var pingData = history.slice().reverse().map(function(h) { return h.ping_rtt_ms !== null ? h.ping_rtt_ms : null; });
    var dnsData = history.slice().reverse().map(function(h) { return h.dns_ms !== null ? h.dns_ms : null; });
    var tgtData = history.slice().reverse().map(function(h) { return h.target_rtt_ms !== null ? h.target_rtt_ms : null; });

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: '网关延迟', data: pingData, borderColor: '#34c759', backgroundColor: 'rgba(52,199,89,0.1)', tension: 0.3, fill: true },
          { label: 'DNS延迟', data: dnsData, borderColor: '#007aff', backgroundColor: 'rgba(0,122,255,0.05)', tension: 0.3, fill: false },
          { label: '目标延迟', data: tgtData, borderColor: '#ff9500', backgroundColor: 'rgba(255,149,0,0.05)', tension: 0.3, fill: false },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { position: 'top', labels: { font: { size: 11 } } } },
        scales: {
          x: { ticks: { maxTicksLimit: 8, font: { size: 10 } } },
          y: { beginAtZero: true, ticks: { font: { size: 10 } } }
        }
      }
    });
  }
}

load();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<div style="text-align:center;font-size:11px;color:#aeaeb2;padding:16px 0;border-top:1px solid #e5e5ea;margin-top:24px;">
  <a href="http://www.lanwatch.net" style="color:#aeaeb2;text-decoration:none;">www.lanwatch.net</a> · 企业网络值守服务<br>

</div>
</body>
</html>
